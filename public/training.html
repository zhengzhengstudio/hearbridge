<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声桥 HearBridge - 数据资产</title>
    <link rel="icon" href="assets/hearbridge-app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css?v=20260711g">
    <link rel="stylesheet" href="hear-ui.css?v=20260711g">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="./" aria-label="声桥 HearBridge 首页">
            <span class="brand-mark" aria-hidden="true"><img src="assets/hearbridge-app-icon.svg" alt=""></span>
            <span><strong>声桥</strong><small>HearBridge</small></span>
        </a>
        <nav class="nav" aria-label="主要功能">
            <a href="./">今日</a>
            <a href="./#caption">沟通</a>
            <a href="challenge.html">闯关</a>
            <a class="active" href="training.html">训练库</a>
            <a href="./#materials">资料</a>
        </nav>
        <p class="privacy-note">数据保存在后端 Termux</p>
    </header>
    <main class="app-page">
        <section class="page-hero">
            <div>
                <h1>数据资产：训练你的个人词库。</h1>
                <p>保存热词、错词修正和闯关样本。未来可作为本地小模型或云端识别的热词上下文。</p>
            </div>
            <div class="hero-stat"><strong id="trainingScore">0</strong><span>训练资产数：热词、样本、错词修正都会计入。</span></div>
        </section>
        <section class="app-grid">
            <div class="training-stack">
                <article class="training-card">
                    <h2>添加热词</h2>
                    <p>适合保存人名、医院科室、药名、项目名、常去地点。</p>
                    <div class="manual-capture">
                        <input id="hotwordInput" type="text" maxlength="40" placeholder="例如：布洛芬、复诊、3号线">
                        <button class="button button-primary" id="addHotword">保存热词</button>
                    </div>
                    <div class="hotword-grid" id="hotwordGrid"></div>
                </article>
                <article class="training-card">
                    <h2>错词修正</h2>
                    <p>把“识别错了什么”和“正确应该是什么”记下来，未来作为个性化校正规则。</p>
                    <div class="manual-capture">
                        <input id="wrongWord" type="text" maxlength="40" placeholder="错词">
                        <input id="rightWord" type="text" maxlength="40" placeholder="正确词">
                        <button class="button" id="addCorrection">保存</button>
                    </div>
                    <ul class="sample-list" id="correctionList"></ul>
                </article>
            </div>
            <aside class="training-card">
                <h2>训练样本</h2>
                <p>来自闯关、录音打点和手动字幕。保存在后端。</p>
                <ul class="sample-list" id="sampleList"></ul>
                <div class="toolbar">
                    <button class="button button-ghost" id="clearTraining">清空训练数据</button>
                </div>
            </aside>
        </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <nav class="bottom-nav" aria-label="移动端主导航">
        <a href="./">今日</a>
        <a href="./#caption">沟通</a>
        <a href="challenge.html">闯关</a>
        <a class="active" href="training.html">训练库</a>
        <a href="./#materials">资料</a>
    </nav>

    <script src="auth.js?v=20260711g" defer></script>
    <script src="training.js?v=20260711g" defer></script>
</body>
</html>
