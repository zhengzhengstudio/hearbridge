<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声桥 HearBridge - 闯关训练</title>
    <link rel="icon" href="assets/hearbridge-app-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css?v=20260711g">
    <link rel="stylesheet" href="hear-ui.css?v=20260711g">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="./" aria-label="声桥 HearBridge 首页">
            <span class="brand-mark" aria-hidden="true"><img src="assets/hearbridge-app-icon.svg" alt=""></span>
            <span><strong>声桥</strong><small>HearBridge</small></span>
        </a>
        <nav class="nav" aria-label="主要功能">
            <a href="./">沟通</a>
            <a class="active" href="challenge.html">闯关训练</a>
            <a href="training.html">训练数据</a>
            <a href="passport.html">通行证</a>
            <a href="reminders.html">提醒</a>
        </nav>
        <p class="privacy-note">数据保存在后端 Termux</p>
    </header>

    <main class="app-page">
        <section class="page-hero" id="introSection">
            <div>
                <h1>闯关训练</h1>
                <p>用 AI 对话或标准答案两种模式，把医院、地铁、工作等真实沟通场景练成肌肉记忆。</p>
            </div>
            <div class="hero-stat-row">
                <div class="hero-stat">
                    <strong id="xpValue">0</strong>
                    <span>经验</span>
                </div>
                <div class="hero-stat">
                    <strong id="streakValue">0</strong>
                    <span>连胜</span>
                </div>
                <div class="hero-stat">
                    <strong id="collectedValue">0</strong>
                    <span>已收集</span>
                </div>
            </div>
        </section>

        <section class="app-grid" id="setupSection">
            <div class="challenge-map" id="levelList" aria-label="选择关卡"></div>
            <aside class="panel play-panel" aria-label="开始训练">
                <div class="panel-heading compact">
                    <div>
                        <h2 id="levelTitle">选择关卡</h2>
                        <p id="levelGoal"></p>
                    </div>
                </div>
                <div class="scenario-box" id="scenarioBox">
                    <small id="scenarioRole">场景</small>
                    <p id="scenarioText">从左侧选择一个场景，再选模式开始。</p>
                </div>
                <div class="suggested-bar" id="suggestedBar"></div>
                <div class="mode-selector" id="modeSelector">
                    <button class="mode-card" type="button" data-mode="practice">
                        <strong>练习模式</strong>
                        <span>无限提示，随时重试，熟悉表达。</span>
                    </button>
                    <button class="mode-card" type="button" data-mode="challenge">
                        <strong>挑战模式</strong>
                        <span>限制轮数，必须拿到关键信息。</span>
                    </button>
                </div>
                <div class="play-mode-tabs" id="playModeTabs" hidden>
                    <button class="play-mode-tab active" type="button" data-play="ai">AI 自由对话</button>
                    <button class="play-mode-tab" type="button" data-play="answer">标准答案</button>
                </div>
                <button class="button button-primary" id="startMission" type="button">开始训练</button>
            </aside>
        </section>

        <section class="panel play-panel" id="gameSection" hidden>
            <div class="panel-heading compact">
                <div>
                    <h2 id="gameLevelTitle"></h2>
                    <p id="gameLevelGoal"></p>
                </div>
                <div class="game-meta">
                    <span class="badge" id="roundBadge"></span>
                    <span class="badge" id="modeBadge"></span>
                </div>
            </div>

            <div class="scenario-box" id="gameScenario">
                <small>场景</small>
                <p></p>
            </div>

            <div class="chat-box" id="chatBox">
                <p class="chat-placeholder">AI 沟通对象会在这里说话。</p>
            </div>

            <div class="answer-box" id="answerBox">
                <textarea id="answerText" rows="3" maxlength="220" placeholder="写下你想给对方看的话，按回车发送。"></textarea>
                <div class="toolbar split" id="aiActions">
                    <button class="button button-primary" id="completeLevel" type="button">发送</button>
                    <button class="button" id="recordAnswer" type="button">按住录音</button>
                </div>
                <div class="toolbar split" id="quickActions">
                    <button class="button button-ghost" id="useSuggested" type="button">推荐表达</button>
                    <button class="button" id="hintButton" type="button">提示</button>
                    <button class="button" id="giveUpButton" type="button">结束本轮</button>
                </div>
            </div>

            <div class="answer-box" id="answerModeBox" hidden>
                <p id="answerQuestion"></p>
                <div class="hint-box" id="answerHint"></div>
                <div class="answer-options" id="answerOptions"></div>
                <input id="answerInput" type="text" maxlength="120" placeholder="输入你的表达，或直接点上方推荐词">
                <div class="toolbar split">
                    <button class="button button-primary" id="submitAnswer" type="button">提交答案</button>
                    <button class="button" id="recordAnswerMode" type="button">按住录音</button>
                </div>
            </div>

            <div class="feedback-bar" id="feedback" hidden></div>
        </section>

        <section class="panel result-panel" id="resultSection" hidden>
            <h2 id="resultTitle"></h2>
            <p id="resultSummary"></p>
            <div class="score-board" id="scoreBoard">
                <div class="score-item">
                    <strong id="scoreClarity">0</strong>
                    <span>清晰度</span>
                </div>
                <div class="score-item">
                    <strong id="scoreStrategy">0</strong>
                    <span>策略</span>
                </div>
                <div class="score-item">
                    <strong id="scoreCompletion">0</strong>
                    <span>完成度</span>
                </div>
            </div>
            <div class="card-reward" id="cardReward" hidden>
                <strong>已收集常用语</strong>
                <p id="cardRewardText"></p>
            </div>
            <div class="review-list" id="reviewList"></div>
            <div class="toolbar split">
                <button class="button button-primary" id="replayLevel" type="button">再玩一次</button>
                <button class="button" id="backToSetup" type="button">选其他关卡</button>
            </div>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="robot-mascot" id="robotMascot" aria-label="AI 小助手">
        <div class="robot-bubble" id="robotBubble"></div>
        <div class="robot-body" aria-hidden="true">
            <div class="robot-antenna"></div>
            <div class="robot-eyes"><div class="robot-eye"></div><div class="robot-eye"></div></div>
            <div class="robot-mouth"></div>
        </div>
    </div>

    <nav class="bottom-nav" aria-label="移动端主导航">
        <a href="./">沟通</a>
        <a class="active" href="challenge.html">闯关训练</a>
        <a href="training.html">训练数据</a>
        <a href="passport.html">通行证</a>
        <a href="reminders.html">提醒</a>
    </nav>

    <script src="auth.js?v=20260711g" defer></script>
    <script src="challenge.js?v=20260711g" defer></script>
</body>
</html>
